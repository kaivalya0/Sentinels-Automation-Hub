name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Required for GitHub Pages deployment
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install --with-deps chromium

      - name: Run Smoke Tests
        #  Bridge: Injecting Secrets into the environment
        env:
          ORANGE_ADMIN_USER: ${{ secrets.ORANGE_ADMIN_USER }}
          ORANGE_ADMIN_PASS: ${{ secrets.ORANGE_ADMIN_PASS }}
          SAUCE_USER: ${{ secrets.SAUCE_USER }}
          SAUCE_PASS: ${{ secrets.SAUCE_PASS }}
        # Runs only tests marked with @pytest.mark.smoke in parallel
        run: pytest -m smoke -n 3 --alluredir=allure-results

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always() # Ensure report is made even if tests fail
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          publish_branch: gh-pages

      - name: Upload Raw Artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: allure-results
          path: allure-results