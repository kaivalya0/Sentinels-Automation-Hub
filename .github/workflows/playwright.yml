name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Required to allow the runner to write the report to the gh-pages branch
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install --with-deps chromium

      - name: Run Tests
        env:
          ORANGE_ADMIN_USER: ${{ secrets.ORANGE_ADMIN_USER }}
          ORANGE_ADMIN_PASS: ${{ secrets.ORANGE_ADMIN_PASS }}
          SAUCE_USER: ${{ secrets.SAUCE_USER }}
          SAUCE_PASS: ${{ secrets.SAUCE_PASS }}
        run: pytest --alluredir=allure-results

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always() # Ensures report is generated even if tests fail
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          publish_branch: gh-pages

      - name: Upload Raw Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results