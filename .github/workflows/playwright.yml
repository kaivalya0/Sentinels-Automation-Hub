
name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pip show playwright | grep Version | cut -d ' ' -f 2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-python-3.11-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-python-3.11-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Playwright System Deps
        run: playwright install-deps chromium

      - name: Run Smoke Tests
        env:
          ORANGE_ADMIN_USER: ${{ secrets.ORANGE_ADMIN_USER }}
          ORANGE_ADMIN_PASS: ${{ secrets.ORANGE_ADMIN_PASS }}
          SAUCE_USER: ${{ secrets.SAUCE_USER }}
          SAUCE_PASS: ${{ secrets.SAUCE_PASS }}
        run: pytest -m smoke -n 3 --alluredir=allure-results

      - name: Prepare Live Preview
        if: failure()
        run: |
          mkdir -p preview
          # Only run find if the directory was actually created by a test failure
          if [ -d "reports/screenshots" ]; then
            find reports/screenshots -name "*.png" | head -n 1 | xargs -I {} cp {} preview/failure-preview.png
          else
            echo "No local screenshots found (likely a setup/fixture error)."
          fi

      - name: Upload Failure Preview
        if: failure()
        #   continue-on-error prevents the job from failing if no preview exists
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          path: preview/failure-preview.png
          archive: false
          retention-days: 7

      - name: Upload Allure Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results
          path: allure-results
          retention-days: 7

  report:
    name: Generate & Deploy Report
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Download Allure Results
        uses: actions/download-artifact@v8
        with:
          name: allure-results
          path: allure-results
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.13
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20
      - name: Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          publish_branch: gh-pages