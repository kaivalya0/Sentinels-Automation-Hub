version: 2
updates:
  # 1. Keep GitHub Actions up to date (Fixes the Node.js warning)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # 2. Keep Python dependencies up to date (Requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"