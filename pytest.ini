[pytest]
#  Added --strict-markers to prevent typos
#  Kept your timeout and allure settings
addopts = -n 3 --timeout=120 --alluredir=allure-results --clean-alluredir --strict-markers --html=reports/report.html

# Discovery: Tells pytest exactly where to look for tests
testpaths = tests

# Logging: Shows INFO logs in the console during execution
log_cli = true
log_cli_level = INFO

markers =
    smoke: Critical tests for fast feedback
    regression: Full suite validation
    ui: Browser-based tests
    api: Backend endpoint tests (Priority for Base Client)
    test_data_validation: SQL integration and JSON schema verification